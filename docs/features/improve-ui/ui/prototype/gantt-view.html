		<style>
			/* --- Override shared gantt styles for alignment --- */
			.gantt-container {
				display: block;
				height: calc(100vh - 180px);
				border: 1px solid var(--border);
				border-radius: var(--radius-md);
				overflow: hidden;
			}
			.gantt-scroll {
				height: 100%;
				overflow: auto;
			}
			.gantt-inner {
				display: flex;
				min-width: fit-content;
			}
			/* Label panel: sticky left so it stays visible during horizontal scroll */
			.gantt-labels {
				position: sticky;
				left: 0;
				z-index: 20;
				width: 280px;
				flex-shrink: 0;
				border-right: 1px solid var(--border);
				background: var(--bg);
				overflow: visible;
			}
			/* Label header: sticky top */
			.gantt-label-header {
				height: 40px;
				display: flex;
				align-items: center;
				padding: 0 8px;
				border-bottom: 1px solid var(--border);
				background: var(--bg-alt);
				position: sticky;
				top: 0;
				z-index: 25;
			}
			.label-search {
				width: 100%;
				height: 28px;
				padding: 0 8px;
				border: 1px solid var(--border);
				border-radius: var(--radius-sm);
				font-size: 12px;
				color: var(--text-primary);
				background: #fff;
				outline: none;
			}
			.label-search:focus {
				border-color: var(--primary-500);
				box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.1);
			}
			.label-search::placeholder {
				color: var(--text-tertiary);
			}
			/* Timeline panel: no own overflow, gantt-scroll handles all scrolling */
			.gantt-timeline {
				flex: 1;
				overflow: visible;
				position: relative;
			}
			.gantt-header {
				display: block !important;
				height: auto !important;
				position: sticky;
				top: 0;
				z-index: 15;
				background: var(--bg-alt);
				border-bottom: 1px solid var(--border);
			}

			/* --- Label rows --- */
			.gantt-label-row {
				height: 40px;
				display: flex;
				align-items: center;
				padding: 0 12px;
				border-bottom: 1px solid var(--border);
				gap: 8px;
				font-size: 13px;
				background: var(--bg);
			}
			.gantt-label-row.sub {
				padding-left: 36px;
				color: var(--text-secondary);
			}
			.gantt-label-row.main-item {
				cursor: pointer;
				font-weight: 500;
			}
			.gantt-label-row.main-item:hover {
				background: var(--bg-alt);
			}
			.gantt-label-row .tag {
				font-size: 11px;
				height: 18px;
				padding: 0 4px;
			}
			.gantt-label-row .label-title {
				flex: 1;
				overflow: hidden;
				text-overflow: ellipsis;
				white-space: nowrap;
			}
			.gantt-label-row .collapse-toggle {
				cursor: pointer;
				color: var(--text-tertiary);
				font-style: normal;
			}
			.gantt-label-row.sub-row {
				display: none;
			}
			.gantt-label-row.sub-row.visible {
				display: flex;
			}

			/* --- Timeline header --- */
			.gantt-month-row {
				display: flex;
				height: 20px;
				border-bottom: 1px solid var(--border);
			}
			.gantt-month-cell {
				flex-shrink: 0;
				text-align: center;
				font-size: 11px;
				color: var(--text-secondary);
				font-weight: 500;
				line-height: 20px;
				border-right: 1px solid var(--bg-alt);
			}
			.gantt-day-row {
				display: flex;
				height: 20px;
			}
			.gantt-day {
				width: 28px;
				flex-shrink: 0;
				text-align: center;
				font-size: 11px;
				color: var(--text-tertiary);
				border-right: 1px solid var(--bg-alt);
				line-height: 20px;
			}
			/* Weekday = light blue, Weekend = light gray */
			.gantt-day.weekday {
				background: #f0f5ff;
			}
			.gantt-day.weekend {
				background: #d1d5db;
				color: #6b7280;
			}

			/* --- Timeline body --- */
			.gantt-body {
				position: relative;
			}
			.gantt-row {
				height: 40px;
				position: relative;
				border-bottom: 1px solid var(--bg-alt);
			}
			.gantt-row.sub-row {
				display: none;
			}
			.gantt-row.sub-row.visible {
				display: block;
			}
			.gantt-bar {
				position: absolute;
				height: 20px;
				top: 10px;
				border-radius: 6px;
				background: var(--primary-100);
				cursor: pointer;
				min-width: 4px;
				overflow: hidden;
			}
			.gantt-bar .fill {
				height: 100%;
				border-radius: 6px;
				background: #f59e0b;
				position: relative;
			}
			.gantt-bar.not-started .fill {
				background: #94a3b8;
			}
			.gantt-bar.completed .fill {
				background: #10b981;
			}
			.gantt-bar.overdue .fill {
				background: var(--error);
			}
			.fill .bar-percent {
				position: absolute;
				right: 6px;
				top: 50%;
				transform: translateY(-50%);
				font-size: 12px;
				font-weight: 600;
				color: #fff;
				white-space: nowrap;
				text-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
			}
			.gantt-bar.completed {
				background: #d1fae5;
			}
			.gantt-bar.completed .fill {
				background: #10b981;
			}
			.gantt-bar.not-started {
				background: #f1f5f9;
			}
			.gantt-bar.overdue {
				background: var(--error-bg);
			}
			.gantt-bar.overdue .fill {
				background: var(--error);
			}
			.gantt-bar.no-data {
				background: none;
				border: 2px dashed var(--border-dark);
				overflow: visible;
			}
			.gantt-bar.no-data .fill {
				display: none;
			}
			.gantt-bar.no-data .bar-percent {
				display: none;
			}
			.gantt-bar.no-data .bar-percent {
				display: none;
			}
			.gantt-bar .bar-label {
				position: absolute;
				left: 6px;
				top: 50%;
				transform: translateY(-50%);
				font-size: 11px;
				color: #fff;
				white-space: nowrap;
				overflow: hidden;
				text-overflow: ellipsis;
				max-width: calc(100% - 12px);
			}
			.gantt-bar.no-data .bar-label {
				color: var(--text-tertiary);
				font-size: 12px;
				left: 8px;
			}

			/* --- Today marker --- */
			.gantt-today-line {
				position: absolute;
				top: 0;
				bottom: 0;
				width: 2px;
				background: var(--primary-500);
				opacity: 0.5;
				z-index: 5;
				cursor: pointer;
			}
			.gantt-today-line::after {
				content: '';
				position: absolute;
				top: 0;
				left: -4px;
				width: 10px;
				height: 10px;
				background: var(--primary-500);
				border-radius: 50%;
				opacity: 0.8;
			}
			.gantt-today-line:hover {
				opacity: 0.8;
			}
			.gantt-today-line .gantt-today-tip {
				display: none;
				position: absolute;
				top: 8px;
				left: 8px;
				background: var(--primary-600);
				color: #fff;
				font-size: 12px;
				padding: 4px 8px;
				border-radius: var(--radius-sm);
				white-space: nowrap;
				pointer-events: none;
				box-shadow: var(--shadow-md);
			}
			.gantt-today-line:hover .gantt-today-tip {
				display: block;
			}

			/* --- Date range input --- */
			.date-range-input {
				display: flex;
				align-items: center;
				gap: 8px;
				font-size: 14px;
				color: var(--text-secondary);
			}
			.date-range-input input[type='date'] {
				height: 32px;
				padding: 4px 11px;
				border: 1px solid var(--border);
				border-radius: var(--radius-sm);
				font-size: 14px;
				color: var(--text-primary);
			}
			.date-range-input input[type='date']:focus {
				border-color: var(--primary-500);
				box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.1);
				outline: none;
			}
				.load-more-btn {
				display: block;
				width: calc(100% - 24px);
				margin: 8px 12px;
				padding: 8px 0;
				border: 1px dashed var(--border-dark);
				border-radius: var(--radius-sm);
				background: transparent;
				color: var(--text-secondary);
				font-size: 13px;
				cursor: pointer;
				text-align: center;
			}
				.load-more-btn:hover {
				background: var(--bg-alt);
				color: var(--primary-500);
				border-color: var(--primary-500);
			}
		</style>
	</head>

					<script>
				(function () {
					// --- Date range config ---
					var RANGE_START = new Date(2026, 2, 23);
					var RANGE_END = new Date(2026, 4, 10);
					var DAY_WIDTH = 28;
					var TODAY = new Date(2026, 3, 18);
					var ITEMS_PER_PAGE = 20;

					function daysBetween(a, b) {
						return Math.round((b - a) / 86400000);
					}

					function totalDays() {
						return daysBetween(RANGE_START, RANGE_END) + 1;
					}

					function seededRandom(seed) {
						var x = Math.sin(seed * 9301 + 49297) * 233280;
						return x - Math.floor(x);
					}

					// --- Build header ---
					var total = totalDays();
					var headerEl = document.getElementById("ganttHeader");

					var monthRow = document.createElement("div");
					monthRow.className = "gantt-month-row";
					var d = new Date(RANGE_START);
					while (d <= RANGE_END) {
						var currentMonth = d.getMonth();
						var currentYear = d.getFullYear();
						var monthStart = new Date(d);
						while (d.getMonth() === currentMonth && d <= RANGE_END) {
							d.setDate(d.getDate() + 1);
						}
						var monthEnd = new Date(d);
						if (monthEnd > RANGE_END) monthEnd = new Date(RANGE_END);
						monthEnd.setDate(monthEnd.getDate() + 1);
						var span = daysBetween(monthStart, monthEnd);
						var cell = document.createElement("div");
						cell.className = "gantt-month-cell";
						cell.style.width = span * DAY_WIDTH + "px";
						cell.textContent =
							currentYear + "/" + String(currentMonth + 1).padStart(2, "0");
						monthRow.appendChild(cell);
					}
					headerEl.appendChild(monthRow);

					var dayRow = document.createElement("div");
					dayRow.className = "gantt-day-row";
					for (var i = 0; i < total; i++) {
						var day = new Date(RANGE_START);
						day.setDate(day.getDate() + i);
						var dayCell = document.createElement("div");
						dayCell.className = "gantt-day";
						var dow = day.getDay();
						dayCell.classList.add(dow === 0 || dow === 6 ? "weekend" : "weekday");
						dayCell.textContent = day.getDate();
						dayRow.appendChild(dayCell);
					}
					headerEl.appendChild(dayRow);

					// --- Build body rows ---
					var bodyEl = document.getElementById("ganttBody");
					var bodyWidth = total * DAY_WIDTH;
					bodyEl.style.width = bodyWidth + "px";
					headerEl.style.width = bodyWidth + "px";

					// --- All items data ---
					var allItems = [
						{
							id: "MI-001", title: "用户认证模块开发",
							start: new Date(2026, 2, 15), end: new Date(2026, 3, 30),
							pct: 52, cls: "",
							subs: [
								{ id: "SI-001", title: "用户注册接口", start: new Date(2026, 2, 15), end: new Date(2026, 3, 15), pct: 60, cls: "" },
								{ id: "SI-002", title: "登录鉴权实现", start: new Date(2026, 2, 20), end: new Date(2026, 3, 25), pct: 45, cls: "" },
								{ id: "SI-003", title: "权限管理模块", start: new Date(2026, 3, 1), end: new Date(2026, 3, 30), pct: 80, cls: "" }
							]
						},
						{
							id: "MI-002", title: "移动端适配",
							start: new Date(2026, 3, 1), end: new Date(2026, 4, 15),
							pct: 30, cls: "",
							subs: [
								{ id: "SI-004", title: "响应式布局", start: new Date(2026, 3, 1), end: new Date(2026, 3, 30), pct: 50, cls: "" },
								{ id: "SI-005", title: "触屏交互优化", start: new Date(2026, 3, 15), end: new Date(2026, 4, 15), pct: 10, cls: "not-started" }
							]
						},
						{
							id: "MI-003", title: "数据报表系统",
							start: new Date(2026, 2, 1), end: new Date(2026, 3, 10),
							pct: 100, cls: "completed"
						},
						{
							id: "MI-004", title: "性能优化项目",
							start: null, end: null, pct: 0, cls: "no-data"
						}
					];

					var extraNames = [
						"API网关重构", "消息推送系统", "数据迁移方案", "CI/CD流水线优化", "监控告警平台",
						"日志分析系统", "文件存储服务", "搜索引擎集成", "多语言支持", "支付系统对接",
						"用户反馈系统", "缓存策略优化", "自动化测试框架", "容器化部署", "微服务拆分",
						"安全审计系统", "灰度发布平台", "数据备份方案", "代码质量扫描", "开发者文档",
						"运维管理后台"
					];
					var statusCycle = [
						{ pct: 35, cls: "" },
						{ pct: 0, cls: "not-started" },
						{ pct: 70, cls: "" },
						{ pct: 100, cls: "completed" },
						{ pct: 15, cls: "" }
					];

					extraNames.forEach(function (name, i) {
						var idx = i + 5;
						var s = statusCycle[i % statusCycle.length];
						var startDay = Math.floor(seededRandom(idx) * 20);
						var duration = 10 + Math.floor(seededRandom(idx + 100) * 25);
						var endDate = new Date(2026, 2, 23 + startDay + duration);
						if (endDate > RANGE_END) endDate = new Date(RANGE_END);
						allItems.push({
							id: "MI-" + String(idx).padStart(3, "0"),
							title: name,
							start: new Date(2026, 2, 23 + startDay),
							end: endDate,
							pct: s.pct,
							cls: s.cls
						});
					});

					// --- Rendering ---
					var loadedCount = 0;

					function getGroup(item) {
						return "mi" + item.id.split("-")[1];
					}

					function createLabelRow(item, isSub, group) {
						var row = document.createElement("div");
						row.className = "gantt-label-row" + (isSub ? " sub sub-row" : " main-item");
						row.setAttribute("data-group", group);
						if (!isSub) {
							var toggle = document.createElement("i");
							toggle.className = "collapse-toggle";
							toggle.setAttribute("data-target", group);
							toggle.textContent = "▶";
							if (!item.subs || item.subs.length === 0) toggle.style.visibility = "hidden";
							row.appendChild(toggle);
						}
						var tag = document.createElement("span");
						tag.className = "tag " + (isSub ? "tag-default" : "tag-blue") + " tag-mono";
						tag.textContent = item.id;
						row.appendChild(tag);
						var title = document.createElement("span");
						title.className = "label-title";
						title.textContent = item.title;
						row.appendChild(title);
						return row;
					}

					function createTimelineRow(item, isSub, group) {
						var row = document.createElement("div");
						row.className = "gantt-row" + (isSub ? " sub-row" : "");
						row.setAttribute("data-group", group);
						if (item.start && item.end) {
							var startOffset = daysBetween(RANGE_START, item.start);
							var endOffset = daysBetween(RANGE_START, item.end);
							if (startOffset < 0) startOffset = 0;
							if (endOffset > total) endOffset = total;
							var bar = document.createElement("div");
							bar.className = "gantt-bar" + (item.cls ? " " + item.cls : "");
							bar.style.left = startOffset * DAY_WIDTH + "px";
							bar.style.width = (endOffset - startOffset + 1) * DAY_WIDTH + "px";
							var fill = document.createElement("div");
							fill.className = "fill";
							fill.style.width = item.pct + "%";
							bar.appendChild(fill);
							var pctLabel = document.createElement("span");
							pctLabel.className = "bar-percent";
							pctLabel.textContent = item.pct + "%";
							fill.appendChild(pctLabel);
							row.appendChild(bar);
						} else {
							var bar = document.createElement("div");
							bar.className = "gantt-bar no-data";
							bar.style.left = "14px";
							bar.style.width = "120px";
							var label = document.createElement("span");
							label.className = "bar-label";
							label.textContent = "未设置时间";
							bar.appendChild(label);
							row.appendChild(bar);
						}
						return row;
					}

					function renderItems(startIdx, count) {
						var labelsEl = document.getElementById("ganttLabels");
						var loadMoreEl = document.getElementById("loadMoreContainer");
						var endIdx = Math.min(startIdx + count, allItems.length);
						for (var i = startIdx; i < endIdx; i++) {
							var item = allItems[i];
							var group = getGroup(item);
							labelsEl.insertBefore(createLabelRow(item, false, group), loadMoreEl);
							bodyEl.appendChild(createTimelineRow(item, false, group));
							if (item.subs) {
								item.subs.forEach(function (sub) {
									labelsEl.insertBefore(createLabelRow(sub, true, group), loadMoreEl);
									bodyEl.appendChild(createTimelineRow(sub, true, group));
								});
							}
						}
						loadedCount = endIdx;
						updateLoadMoreButton();
						bindCollapseEvents();
					}

					function updateLoadMoreButton() {
						document.getElementById("loadMoreContainer").style.display =
							loadedCount < allItems.length ? "block" : "none";
					}

					function bindCollapseEvents() {
						document.querySelectorAll(".collapse-toggle").forEach(function (toggle) {
							if (toggle._bound) return;
							toggle._bound = true;
							toggle.addEventListener("click", function (e) {
								e.stopPropagation();
								var target = toggle.getAttribute("data-target");
								var isOpen = toggle.textContent.trim() === "▼";
								toggle.textContent = isOpen ? "▶" : "▼";
								document.querySelectorAll(
									'.gantt-label-row.sub-row[data-group="' + target + '"]'
								).forEach(function (row) {
									row.classList.toggle("visible", !isOpen);
								});
								document.querySelectorAll(
									'.gantt-row.sub-row[data-group="' + target + '"]'
								).forEach(function (row) {
									row.classList.toggle("visible", !isOpen);
								});
							});
						});
						document.querySelectorAll(".gantt-label-row.main-item").forEach(function (row) {
							if (row._bound) return;
							row._bound = true;
							row.addEventListener("click", function () {
								var toggle = row.querySelector(".collapse-toggle");
								if (toggle && toggle.style.visibility !== "hidden") {
									toggle.click();
								}
							});
						});
					}

					// Initial load
					renderItems(0, ITEMS_PER_PAGE);

					// Load more
					document.getElementById("loadMoreBtn").addEventListener("click", function () {
						renderItems(loadedCount, ITEMS_PER_PAGE);
					});

					// --- Today marker ---
					var todayOffset = daysBetween(RANGE_START, TODAY);
					if (todayOffset >= 0 && todayOffset < total) {
						var todayLine = document.createElement("div");
						todayLine.className = "gantt-today-line";
						todayLine.style.left = todayOffset * DAY_WIDTH + 14 + "px";
						var tip = document.createElement("span");
						tip.className = "gantt-today-tip";
						tip.textContent = "今天";
						todayLine.appendChild(tip);
						bodyEl.appendChild(todayLine);
					}

					// --- Title search filter ---
					document.getElementById("labelSearch").addEventListener("input", function () {
						var keyword = this.value.trim().toLowerCase();
						var labels = document.querySelectorAll("#ganttLabels .gantt-label-row");
						labels.forEach(function (row) {
							if (!keyword) {
								if (!row.classList.contains("sub-row")) row.style.display = "";
								return;
							}
							var title = row.querySelector(".label-title");
							var text = title ? title.textContent.toLowerCase() : "";
							var match = text.indexOf(keyword) !== -1;
							if (row.classList.contains("main-item")) {
								row.style.display = match ? "" : "none";
								if (match) {
									var group = row.getAttribute("data-group");
									document.querySelectorAll(
										'.sub-row[data-group="' + group + '"]'
									).forEach(function (sub) {
										sub.classList.add("visible");
									});
								}
							} else if (row.classList.contains("sub-row")) {
								var group = row.getAttribute("data-group");
								var parentRow = document.querySelector(
									'.gantt-label-row.main-item[data-group="' + group + '"]'
								);
								var parentMatch = parentRow && parentRow.style.display !== "none";
								if (match || parentMatch) {
									row.classList.add("visible");
								} else {
									row.style.display = "none";
								}
							}
						});

						// Sync timeline body rows
						var bodyRows = document.querySelectorAll("#ganttBody .gantt-row");
						var labelRows = document.querySelectorAll("#ganttLabels .gantt-label-row");
						bodyRows.forEach(function (bodyRow, i) {
							var labelRow = labelRows[i];
							if (!labelRow) return;
							if (labelRow.classList.contains("sub-row")) {
								bodyRow.style.display =
									labelRow.classList.contains("visible") &&
									labelRow.style.display !== "none"
										? ""
										: "none";
							} else {
								bodyRow.style.display = labelRow.style.display || "";
							}
						});
					});
				})();
			</script>
	</body>
</html>
