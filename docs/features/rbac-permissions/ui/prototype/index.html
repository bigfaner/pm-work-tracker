<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RBAC 权限体系 — 原型导航</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="index-layout">
    <div class="index-header">
      <h1>RBAC 权限体系 — UI 原型</h1>
      <p>以下页面展示了 RBAC 权限系统的交互原型，基于 Shadcn 设计风格。点击卡片进入对应页面。</p>
    </div>

    <div class="page-grid">
      <!-- Page 1: Role Management -->
      <a href="admin-roles.html" class="page-card">
        <div class="page-card-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        </div>
        <h3>角色管理</h3>
        <p>超级管理员管理系统角色：创建、编辑、删除自定义角色，配置权限码勾选，浏览权限全貌。</p>
      </a>

      <!-- Page 2: Team Invite with Role -->
      <a href="team-invite.html" class="page-card">
        <div class="page-card-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
        </div>
        <h3>邀请成员 &amp; 角色管理</h3>
        <p>PM 邀请成员加入团队并指定角色，变更已有成员的角色。展示团队成员列表及权限控制。</p>
      </a>

      <!-- Page 3: Permission Demo -->
      <a href="permission-demo.html" class="page-card">
        <div class="page-card-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        </div>
        <h3>权限驱动渲染</h3>
        <p>切换角色查看 UI 元素的显示/隐藏效果。展示 usePermission Hook 和 PermissionGuard 的行为。</p>
      </a>
    </div>
  </div>
