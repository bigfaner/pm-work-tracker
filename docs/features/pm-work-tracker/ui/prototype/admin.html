                    <tr>
                      <th>姓名</th>
                      <th>账号</th>

                      <th>操作</th>
                    </tr>
                  </thead>
                  <tbody>

                      </td>

                      <td>
                        <span class="tag tag-blue">产品研发组</span>
                        <span class="tag tag-default">设计组</span>
                      </td>
                      <td><button class="switch active disabled"></button></td>
                      <td>&mdash;</td>
                    </tr>
                    <!-- User 2 -->
                    <tr>
                      <td>
                        <div class="flex items-center gap-8">
                          <div class="avatar avatar-sm" style="background:#52c41a;">李</div>
                          <span>李伟</span>
                        </div>
                      </td>
                      <td class="text-mono">liwei</td>
                      <td>
                        <span class="tag tag-blue">产品研发组</span>
                      </td>
                      <td>
                        <button class="switch active" data-confirm-switch data-user="李伟"></button>
                      </td>
                      <td>
                        <button class="btn btn-sm btn-link" onclick="showToast('查看用户详情')">查看</button>
                      </td>
                    </tr>
                    <!-- User 3 -->
                    <tr>
                      <td>
                        <div class="flex items-center gap-8">
                          <div class="avatar avatar-sm" style="background:#fa8c16;">张</div>
                          <span>张明</span>
                        </div>
                      </td>
                      <td class="text-mono">zhangming</td>
                      <td>
                        <span class="tag tag-blue">产品研发组</span>
                      </td>
                      <td>
                        <button class="switch" data-confirm-switch data-user="张明"></button>
                      </td>
                      <td>
                        <button class="btn btn-sm btn-link" onclick="showToast('查看用户详情')">查看</button>
                      </td>
                    </tr>
                    <!-- User 4 -->
                    <tr>
                      <td>
                        <div class="flex items-center gap-8">
                          <div class="avatar avatar-sm" style="background:#eb2f96;">王</div>
                          <span>王芳</span>
                        </div>
                      </td>
                      <td class="text-mono">wangfang</td>
                      <td>
                        <span class="tag tag-blue">产品研发组</span>
                      </td>
                      <td>
                        <button class="switch" data-confirm-switch data-user="王芳"></button>
                      </td>
                      <td>
                        <button class="btn btn-sm btn-link" onclick="showToast('查看用户详情')">查看</button>

                    </tr>
                    <!-- User 5: 2 teams -->

                      <td class="text-mono">chenjing</td>
                      <td>
                        <span class="tag tag-blue">产品研发组</span>
                        <span class="tag tag-default">设计组</span>
                      </td>
                      <td>
                        <button class="switch" data-confirm-switch data-user="陈静"></button>
                      </td>
                      <td>

                      </td>
                    </tr>
                    <!-- User 6: no teams -->

                        <div class="flex items-center gap-8">

                      <td>

        <!-- Tab: Team List -->

          <div class="card">

                <table>

                          <span>张伟</span>

                      </td>

                    <tr>

  <script src="app.js"></script>
  <script>
    // Override default switch behavior for confirm-switches
    document.querySelectorAll('[data-confirm-switch]').forEach(function(sw) {
      // Add a capturing listener that runs before app.js's bubble listener
      sw.addEventListener('click', function(e) {
        e.stopImmediatePropagation();
        var userName = sw.getAttribute('data-user');
        var isActive = sw.classList.contains('active');
        var action = isActive ? '关闭' : '开启';
        showConfirm('确定要' + action + ' ' + userName + ' 的创建团队权限吗？', function() {
          sw.classList.toggle('active');
          showToast('权限已更新');
        });
      }, true); // capture phase
    });
  </script>
</body>
