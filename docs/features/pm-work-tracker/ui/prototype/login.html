<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - PM 工作事项追踪</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-logo">
        <div class="login-logo-icon">PM</div>
        <h2>PM 工作事项追踪</h2>
      </div>

      <form id="login-form" autocomplete="off">
        <div class="form-group">
          <label class="form-label" for="username">账号</label>
          <div style="position:relative;">
            <span style="position:absolute;left:11px;top:50%;transform:translateY(-50%);color:rgba(0,0,0,0.25);font-size:16px;">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </span>
            <input id="username" type="text" class="form-input form-input-lg" placeholder="请输入账号" style="padding-left:32px;">
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">密码</label>
          <div style="position:relative;">
            <span style="position:absolute;left:11px;top:50%;transform:translateY(-50%);color:rgba(0,0,0,0.25);font-size:16px;">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            </span>
            <input id="password" type="password" class="form-input form-input-lg" placeholder="请输入密码" style="padding-left:32px;">
          </div>
        </div>

        <div id="login-error" class="alert alert-error" style="display:none;">
          <span class="alert-icon">&#x2717;</span>
          <span>账号或密码错误</span>
        </div>

        <button id="login-btn" type="submit" class="btn btn-primary btn-lg btn-block" disabled>
          登录
        </button>
      </form>

      <div style="text-align:center;margin-top:24px;color:rgba(0,0,0,0.25);font-size:12px;">
        v1.0.0 &copy; 2026 PM Work Tracker
      </div>
    </div>
  </div>

  <script>
    (function() {
      var usernameInput = document.getElementById('username');
      var passwordInput = document.getElementById('password');
      var loginBtn = document.getElementById('login-btn');
      var errorAlert = document.getElementById('login-error');
      var loginForm = document.getElementById('login-form');

      function checkFields() {
        var filled = usernameInput.value.trim() !== '' && passwordInput.value.trim() !== '';
        loginBtn.disabled = !filled;
      }

      usernameInput.addEventListener('input', checkFields);
      passwordInput.addEventListener('input', checkFields);

      // Hide error when user starts typing
      usernameInput.addEventListener('input', function() {
        errorAlert.style.display = 'none';
      });
      passwordInput.addEventListener('input', function() {
        errorAlert.style.display = 'none';
      });

      loginForm.addEventListener('submit', function(e) {
        e.preventDefault();
        if (loginBtn.disabled) return;

        // Show loading state
        loginBtn.classList.add('loading');
        loginBtn.innerHTML = '<span class="spin" style="margin-right:8px;"><span class="spin-icon" style="width:16px;height:16px;border-width:2px;"></span></span>登录中...';

        // Simulate login: show error on first attempt, succeed on second
        var hasFailed = sessionStorage.getItem('login_failed');
        if (!hasFailed) {
          // First attempt: show error
          setTimeout(function() {
            loginBtn.classList.remove('loading');
            loginBtn.innerHTML = '登录';
            errorAlert.style.display = 'flex';
            sessionStorage.setItem('login_failed', '1');
          }, 1000);
        } else {
          // Second attempt: redirect
          setTimeout(function() {
            sessionStorage.removeItem('login_failed');
            window.location.href = 'main-items.html';
          }, 1000);
        }
      });
    })();
  </script>
</body>
</html>
